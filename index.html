<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TradeCat — Market Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --line:#222a35; --txt:#e6edf3;
    --muted:#8b949e; --up:#26a269; --down:#e5534b; --accent:#d4a017;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt);font-size:14px}
  header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;
         align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;letter-spacing:.5px}
  header h1 b{color:var(--accent)}
  .updated{color:var(--muted);font-size:12px}
  nav{display:flex;gap:4px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  nav button{background:none;border:none;color:var(--muted);padding:13px 18px;cursor:pointer;
             font-size:14px;border-bottom:2px solid transparent}
  nav button.active{color:var(--txt);border-bottom-color:var(--accent);font-weight:600}
  main{padding:20px;max-width:1180px;margin:0 auto}
  .tab{display:none}.tab.active{display:block}

  /* indicator strip */
  .indicators{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
  .ind{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
  .ind .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.3px;display:block}
  .ind .val{font-size:20px;font-weight:600;margin-top:3px}
  .ind .asof{color:var(--muted);font-size:10px}

  /* filter chips */
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:14px;
        padding:5px 13px;cursor:pointer;font-size:12.5px}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#0e1117;font-weight:600}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:right;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
  th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:#1b212b}
  tbody tr.sel{background:#202935}
  .sym{font-weight:600}
  .tag{color:var(--muted);font-size:11px;border:1px solid var(--line);border-radius:10px;padding:1px 8px}
  .up{color:var(--up)}.down{color:var(--down)}

  /* chart + range controls */
  .chartbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:18px}
  .ranges{display:flex;gap:5px}
  .ranges button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
                 border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12.5px}
  .ranges button.active{background:var(--accent);border-color:var(--accent);color:#0e1117;font-weight:600}
  .dates{margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
  .dates input{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:4px 7px;font-size:12px}
  .chartwrap{margin-top:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;height:340px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .card h3{margin:0 0 4px;font-size:15px}
  .card .move{font-size:13px;margin-bottom:8px}
  .news{list-style:none;margin:0;padding:0}
  .news li{padding:7px 0;border-top:1px solid var(--line)}
  .news a{color:var(--txt);text-decoration:none}
  .news a:hover{color:var(--accent)}
  .news .src{color:var(--muted);font-size:11px;display:block;margin-top:2px}
  h2.section{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
             margin:26px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
</style>
</head>
<body>
<header>
  <h1><b>TradeCat</b> &middot; Market Dashboard</h1>
  <span class="updated" id="updated"></span>
</header>
<nav>
  <button class="active" data-tab="market">Overall Market</button>
  <button data-tab="movers">Movers &amp; News</button>
  <button data-tab="asia">Asia</button>
</nav>
<main>
  <!-- TAB 1 -->
  <section class="tab active" id="market">
    <h2 class="section">Key macro indicators</h2>
    <div class="indicators" id="indicators"></div>

    <h2 class="section">Markets</h2>
    <div class="chips" id="classChips"></div>
    <table id="mktTable">
      <thead><tr>
        <th data-k="symbol">Symbol</th><th data-k="name">Name</th>
        <th data-k="asset_class">Class</th><th data-k="price">Price</th>
        <th data-k="change_pct">Chg %</th><th data-k="last_dividend">Last Div</th>
      </tr></thead>
      <tbody></tbody>
    </table>

    <div class="chartbar">
      <div class="ranges" id="ranges">
        <button data-d="21">1M</button><button data-d="63">3M</button>
        <button data-d="126">6M</button><button data-d="252" class="active">1Y</button>
        <button data-d="0">All</button>
      </div>
      <div class="dates">
        <label>From <input type="date" id="fromDate"></label>
        <label>To <input type="date" id="toDate"></label>
      </div>
    </div>
    <div class="chartwrap"><canvas id="bigChart"></canvas></div>

    <h2 class="section">Global market headlines</h2>
    <ul class="news" id="globalNews"></ul>
  </section>

  <!-- TAB 2 -->
  <section class="tab" id="movers">
    <p class="updated">Sorted by absolute move — biggest movers first, paired with their headlines.</p>
    <div id="moverCards"></div>
  </section>

  <!-- TAB 3 -->
  <section class="tab" id="asia">
    <table id="asiaTable">
      <thead><tr>
        <th>Symbol</th><th>Name</th><th>Price</th><th>Chg %</th><th>Last Div</th>
      </tr></thead><tbody></tbody>
    </table>
    <h2 class="section">Asia headlines</h2>
    <ul class="news" id="asiaNews"></ul>
  </section>
</main>

<script>
const DATA = "./data/";
let MARKET, HISTORY, NEWS, IND, chart;
let sortKey="change_pct", sortDir=1, curSym=null, curRange=252, classFilter="All";

const fmt = n => n==null ? "—" : Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const pct = n => n==null ? "—" : (n>0?"+":"")+n.toFixed(2)+"%";
const cls = n => n>0?"up":n<0?"down":"";

async function load(){
  [MARKET,HISTORY,NEWS,IND] = await Promise.all([
    fetch(DATA+"market.json").then(r=>r.json()),
    fetch(DATA+"history.json").then(r=>r.json()),
    fetch(DATA+"news.json").then(r=>r.json()),
    fetch(DATA+"indicators.json").then(r=>r.json()).catch(()=>({indicators:[]})),
  ]);
  document.getElementById("updated").textContent =
    "updated " + new Date(MARKET.updated).toLocaleString() + " · end-of-day data";
  renderIndicators(); renderChips(); renderMarket(); renderMovers(); renderAsia();
  renderNewsList("globalNews",NEWS.macro.global);
  renderNewsList("asiaNews",NEWS.macro.asia);
  const first = filtered()[0] || MARKET.instruments[0];
  selectRow(first.symbol);
}

function renderIndicators(){
  document.getElementById("indicators").innerHTML = (IND.indicators||[]).map(i=>{
    const sign = i.unit==="pp" ? (i.value>0?"up":i.value<0?"down":"") : "";
    return `<div class="ind"><span class="lbl">${i.name}</span>
      <div class="val ${sign}">${fmt(i.value)}${i.unit==="%"?"%":i.unit==="pp"?" pp":""}</div>
      <span class="asof">as of ${i.asof||""} · ${i.source||""}</span></div>`;
  }).join("") || "<span class='updated'>No indicator data.</span>";
}

function classes(){ return MARKET.asset_class_order || [...new Set(MARKET.instruments.map(i=>i.asset_class))]; }
function renderChips(){
  const all = ["All", ...classes()];
  document.getElementById("classChips").innerHTML = all.map(c=>
    `<span class="chip ${c===classFilter?"active":""}" data-c="${c}">${c}</span>`).join("");
  document.querySelectorAll("#classChips .chip").forEach(ch=>ch.onclick=()=>{
    classFilter=ch.dataset.c; renderChips(); renderMarket();
    const f=filtered(); if(f.length) selectRow(f[0].symbol);
  });
}
function filtered(){
  let rows = classFilter==="All" ? MARKET.instruments
           : MARKET.instruments.filter(i=>i.asset_class===classFilter);
  return [...rows].sort((a,b)=>{
    let x=a[sortKey],y=b[sortKey]; x=x==null?-1e9:x; y=y==null?-1e9:y;
    return (x<y?-1:x>y?1:0)*sortDir;});
}

function renderMarket(){
  const tb = document.querySelector("#mktTable tbody");
  tb.innerHTML = filtered().map(i=>`
    <tr data-sym="${i.symbol}">
      <td class="sym">${i.symbol}</td><td>${i.name}</td>
      <td><span class="tag">${i.asset_class}</span></td>
      <td>${fmt(i.price)}</td>
      <td class="${cls(i.change_pct)}">${pct(i.change_pct)}</td>
      <td>${i.last_dividend==null?"—":fmt(i.last_dividend)}</td>
    </tr>`).join("");
  tb.querySelectorAll("tr").forEach(tr=>tr.onclick=()=>selectRow(tr.dataset.sym));
  highlight();
}
document.querySelectorAll("#mktTable th").forEach(th=>th.onclick=()=>{
  const k=th.dataset.k; sortDir=(k===sortKey)?-sortDir:1; sortKey=k; renderMarket();
});

function highlight(){
  document.querySelectorAll("#mktTable tbody tr").forEach(tr=>
    tr.classList.toggle("sel", tr.dataset.sym===curSym));
}
function selectRow(sym){ curSym=sym; highlight(); drawChart(); }

// range buttons
document.querySelectorAll("#ranges button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#ranges button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); curRange=+b.dataset.d;
  document.getElementById("fromDate").value=""; document.getElementById("toDate").value="";
  drawChart();
});
// custom date inputs
["fromDate","toDate"].forEach(id=>document.getElementById(id).onchange=()=>{
  document.querySelectorAll("#ranges button").forEach(x=>x.classList.remove("active"));
  drawChart();
});

function sliceData(sym){
  let h = HISTORY[sym]||[];
  const from=document.getElementById("fromDate").value, to=document.getElementById("toDate").value;
  if(from||to){
    h = h.filter(p => (!from||p.time>=from) && (!to||p.time<=to));
  } else if(curRange>0){
    h = h.slice(-curRange);
  }
  return h;
}

function drawChart(){
  const sym=curSym, h=sliceData(sym);
  const labels=h.map(p=>p.time), data=h.map(p=>p.price);
  const inst=MARKET.instruments.find(i=>i.symbol===sym)||{};
  const col = data.length>1 && data[data.length-1]>=data[0] ? "#26a269" : "#e5534b";
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("bigChart"),{
    type:"line",
    data:{labels,datasets:[{label:`${inst.name} (${sym})`,data,borderColor:col,
      backgroundColor:col+"22",fill:true,pointRadius:0,borderWidth:2,tension:.15}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#e6edf3"}}},
      scales:{x:{ticks:{color:"#8b949e",maxTicksLimit:8},grid:{color:"#222a35"}},
              y:{ticks:{color:"#8b949e"},grid:{color:"#222a35"}}}}
  });
}

function renderMovers(){
  const items=[...MARKET.instruments].sort((a,b)=>
    Math.abs(b.change_pct||0)-Math.abs(a.change_pct||0));
  document.getElementById("moverCards").innerHTML = items.map(i=>{
    const news=(NEWS.by_ticker[i.symbol]||[]).map(n=>
      `<li><a href="${n.link}" target="_blank" rel="noopener">${n.title}</a>
        <span class="src">${n.publisher||""}</span></li>`).join("")
      || `<li class="src">No headlines today.</li>`;
    return `<div class="card">
      <h3>${i.name} <span class="tag">${i.symbol}</span> <span class="tag">${i.asset_class}</span></h3>
      <div class="move">${fmt(i.price)} ·
        <span class="${cls(i.change_pct)}">${pct(i.change_pct)}</span></div>
      <ul class="news">${news}</ul></div>`;
  }).join("");
}

function renderAsia(){
  const tb=document.querySelector("#asiaTable tbody");
  tb.innerHTML = MARKET.instruments.filter(i=>i.region==="Asia").map(i=>`
    <tr><td class="sym">${i.symbol}</td><td>${i.name}</td>
      <td>${fmt(i.price)}</td>
      <td class="${cls(i.change_pct)}">${pct(i.change_pct)}</td>
      <td>${i.last_dividend==null?"—":fmt(i.last_dividend)}</td></tr>`).join("");
}

function renderNewsList(id,items){
  document.getElementById(id).innerHTML = items.map(n=>
    `<li><a href="${n.link}" target="_blank" rel="noopener">${n.title}</a>
      <span class="src">${n.source||n.publisher||""}</span></li>`).join("");
}

document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  document.getElementById(b.dataset.tab).classList.add("active");
});

load().catch(e=>document.querySelector("main").innerHTML =
  "<p style='color:#e5534b'>Failed to load data — make sure the page is served over http "
  +"(not opened as a file://) and data/*.json exist.<br>"+e+"</p>");
</script>
</body>
</html>
